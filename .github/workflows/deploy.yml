name: Deploy backend to EC2

# Auto-deploy when backend/deploy code changes on main.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}   # also allow manual "Run workflow"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and update
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/zuno-content-pipeline
            git pull --ff-only
            cd deploy
            docker compose up -d --build
            docker image prune -f
            echo "✅ Backend updated to $(git -C ~/zuno-content-pipeline rev-parse --short HEAD)"
