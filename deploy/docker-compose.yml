# Runs the backend + a Caddy reverse proxy that terminates HTTPS.
# Usage (on the EC2 instance, from the deploy/ dir):
#   echo "SITE_ADDRESS=<your-ip-with-dashes>.nip.io" > caddy.env
#   docker compose up -d --build
services:
  backend:
    build: ../backend
    image: zuno-backend          # shared by the worker services below
    env_file: ../backend/prod.env
    restart: unless-stopped
    expose:
      - "8000"
    # Google service-account key (Vertex/Imagen). Remove these two lines if you
    # use GOOGLE_API_KEY in prod.env instead of a JSON key.
    volumes:
      - ../backend/gcp-key.json:/app/gcp-key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json

  # Image production daemon: generates pending image_assets in 250-image
  # chunks (QC + dual-size S3 upload), refreshing the gallery between chunks.
  # restart: always -> container swaps RESUME it instead of killing it.
  imageworker:
    image: zuno-backend
    env_file: ../backend/prod.env
    restart: always
    command: sh /app/run_image_batches.sh
    volumes:
      - ../backend/gcp-key.json:/app/gcp-key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
    depends_on:
      - backend

  # Content generation daemon: generates lessons for pending theme-catalog
  # rows (questions + image/audio asset registration). Self-recovers from
  # quota holds; new CSV uploads produce lessons automatically.
  contentworker:
    image: zuno-backend
    env_file: ../backend/prod.env
    restart: always
    command: sh /app/run_content_batches.sh
    volumes:
      - ../backend/gcp-key.json:/app/gcp-key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
    depends_on:
      - backend

  # Audio production daemon: synthesizes pending audio_assets rows with the
  # locked bird voice (Neural2-F +5, rate 0.8) and uploads MP3s to S3.
  audioworker:
    image: zuno-backend
    env_file: ../backend/prod.env
    restart: always
    command: sh /app/run_audio_batches.sh
    volumes:
      - ../backend/gcp-key.json:/app/gcp-key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
    depends_on:
      - backend

  # Keeps the S3 review gallery within 30 min of live.
  gallery:
    image: zuno-backend
    env_file: ../backend/prod.env
    restart: always
    command: sh -c 'while :; do python /app/make_gallery.py; sleep 1800; done'
    depends_on:
      - backend

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file: caddy.env          # contains SITE_ADDRESS=<host>.nip.io
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /home/ec2-user/zuno-frontend:/srv/app:ro   # static frontend export
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
