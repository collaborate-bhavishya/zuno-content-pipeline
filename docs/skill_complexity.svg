<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="840" viewBox="0 0 1140 840" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arUp" markerWidth="10" markerHeight="10" refX="5" refY="1" orient="auto" markerUnits="strokeWidth">
      <path d="M0,6 L5,0 L10,6 Z" fill="#64748b"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="2" flood-color="#0b1f3a" flood-opacity="0.13"/>
    </filter>
    <style>
      .ttl { fill:#fff; font-size:23px; font-weight:700; }
      .sub { fill:#9fb3c8; font-size:13px; }
      .metric-n { font-size:19px; font-weight:800; fill:#0b1f3a; }
      .metric-l { font-size:11px; fill:#475569; }
      .ph  { font-size:13px; font-weight:800; letter-spacing:.06em; fill:#0b1f3a; }
      .lyr { font-size:13.5px; font-weight:700; }
      .lyrd{ font-size:10.5px; }
      .tpl { font-size:11px; font-weight:700; fill:#1f2937; }
      .ch  { font-size:14px; font-weight:700; }
      .cd  { font-size:11.5px; fill:#374151; }
      .cons{ font-size:11px; fill:#475569; }
      .foot{ font-size:12px; fill:#374151; }
    </style>
  </defs>

  <rect width="1140" height="840" fill="#f6f8fb"/>

  <!-- title -->
  <rect x="0" y="0" width="1140" height="62" fill="#0b1f3a"/>
  <text x="36" y="29" class="ttl">skill_v6.md — the SpeakX Pedagogical DSL</text>
  <text x="36" y="50" class="sub">~284 lines that encode an entire early-childhood speaking curriculum as machine-enforceable rules — the single source of truth every agent reads</text>

  <!-- complexity metrics strip -->
  <g filter="url(#sh)">
    <rect x="36" y="74" width="1068" height="54" rx="9" fill="#fff" stroke="#dbe3ee"/>
  </g>
  <g text-anchor="middle">
    <text x="124" y="100" class="metric-n">18</text><text x="124" y="118" class="metric-l">templates</text>
    <line x1="214" y1="84" x2="214" y2="118" stroke="#e2e8f0"/>
    <text x="312" y="100" class="metric-n">6</text><text x="312" y="118" class="metric-l">learning layers</text>
    <line x1="402" y1="84" x2="402" y2="118" stroke="#e2e8f0"/>
    <text x="500" y="100" class="metric-n">4</text><text x="500" y="118" class="metric-l">age bands (3·4·5·6–7)</text>
    <line x1="590" y1="84" x2="590" y2="118" stroke="#e2e8f0"/>
    <text x="688" y="100" class="metric-n">3</text><text x="688" y="118" class="metric-l">ordering laws</text>
    <line x1="778" y1="84" x2="778" y2="118" stroke="#e2e8f0"/>
    <text x="876" y="100" class="metric-n">2</text><text x="876" y="118" class="metric-l">timing deadlines</text>
    <line x1="966" y1="84" x2="966" y2="118" stroke="#e2e8f0"/>
    <text x="1036" y="100" class="metric-n">5</text><text x="1036" y="118" class="metric-l">I/O modalities</text>
  </g>

  <!-- LEFT: pedagogical ladder -->
  <text x="36" y="152" class="ph">PEDAGOGICAL LADDER  ·  mandatory progression</text>
  <!-- upward demand arrow -->
  <line x1="50" y1="610" x2="50" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arUp)"/>
  <text x="44" y="400" class="metric-l" transform="rotate(-90 44 400)" text-anchor="middle">increasing cognitive demand</text>

  <!-- Layer 1 -->
  <rect x="74" y="164" width="486" height="70" rx="9" fill="#FFF2CC" stroke="#e3c766" filter="url(#sh)"/>
  <text x="90" y="188" class="lyr" fill="#7a5b00">Layer 1 — Vocabulary</text>
  <text x="90" y="205" class="lyrd" fill="#8a6a10">introduce + drill each new word before it can be used</text>
  <g>
    <rect x="90" y="210" width="40" height="18" rx="5" fill="#fff" stroke="#cbb25a"/><text x="110" y="223" class="tpl" text-anchor="middle">T4</text>
    <rect x="136" y="210" width="40" height="18" rx="5" fill="#fff" stroke="#cbb25a"/><text x="156" y="223" class="tpl" text-anchor="middle">T1</text>
    <rect x="182" y="210" width="40" height="18" rx="5" fill="#fff" stroke="#cbb25a"/><text x="202" y="223" class="tpl" text-anchor="middle">T2</text>
    <rect x="228" y="210" width="40" height="18" rx="5" fill="#fff" stroke="#cbb25a"/><text x="248" y="223" class="tpl" text-anchor="middle">T3</text>
    <rect x="274" y="210" width="40" height="18" rx="5" fill="#fff" stroke="#cbb25a"/><text x="294" y="223" class="tpl" text-anchor="middle">T5</text>
    <text x="328" y="223" class="lyrd" fill="#8a6a10">gate: T4 → T1/T2 → T3 → T5</text>
  </g>

  <!-- Layer 2 -->
  <rect x="74" y="242" width="486" height="70" rx="9" fill="#D9E1F2" stroke="#9bb0d6" filter="url(#sh)"/>
  <text x="90" y="266" class="lyr" fill="#234072">Layer 2 — Concept Builder</text>
  <text x="90" y="283" class="lyrd" fill="#33508a">attach meaning · compare · categorize</text>
  <g>
    <rect x="90" y="288" width="40" height="18" rx="5" fill="#fff" stroke="#8da6cf"/><text x="110" y="301" class="tpl" text-anchor="middle">F1</text>
    <rect x="136" y="288" width="40" height="18" rx="5" fill="#fff" stroke="#8da6cf"/><text x="156" y="301" class="tpl" text-anchor="middle">F2</text>
    <rect x="182" y="288" width="40" height="18" rx="5" fill="#fff" stroke="#8da6cf"/><text x="202" y="301" class="tpl" text-anchor="middle">F3</text>
    <rect x="228" y="288" width="40" height="18" rx="5" fill="#fff" stroke="#8da6cf"/><text x="248" y="301" class="tpl" text-anchor="middle">T7</text>
    <rect x="274" y="288" width="48" height="18" rx="5" fill="#fff" stroke="#8da6cf"/><text x="298" y="301" class="tpl" text-anchor="middle">T7.1</text>
    <text x="334" y="301" class="lyrd" fill="#33508a">order: F1 → F2 → F3 → T7 → T7.1</text>
  </g>

  <!-- Layer 2.5 -->
  <rect x="74" y="320" width="486" height="54" rx="9" fill="#EAD1DC" stroke="#cba6ba" filter="url(#sh)"/>
  <text x="90" y="344" class="lyr" fill="#6e3553">Layer 2.5 — Sentence Comprehension</text>
  <rect x="90" y="350" width="40" height="18" rx="5" fill="#fff" stroke="#c298ad"/><text x="110" y="363" class="tpl" text-anchor="middle">T9</text>
  <text x="144" y="363" class="lyrd" fill="#6e3553">mandatory comprehension gate before any sentence build</text>

  <!-- Layer 3 -->
  <rect x="74" y="382" width="486" height="70" rx="9" fill="#E2EFDA" stroke="#a9cf92" filter="url(#sh)"/>
  <text x="90" y="406" class="lyr" fill="#3d6b29">Layer 3 — Sentence Formation</text>
  <text x="90" y="423" class="lyrd" fill="#4a7c34">tap-to-voice scaffold: mechanics before vocal retrieval</text>
  <g>
    <rect x="90" y="428" width="40" height="18" rx="5" fill="#fff" stroke="#97c47c"/><text x="110" y="441" class="tpl" text-anchor="middle">D1</text>
    <rect x="136" y="428" width="48" height="18" rx="5" fill="#fff" stroke="#97c47c"/><text x="160" y="441" class="tpl" text-anchor="middle">T6.1</text>
    <rect x="190" y="428" width="48" height="18" rx="5" fill="#fff" stroke="#97c47c"/><text x="214" y="441" class="tpl" text-anchor="middle">T6.2</text>
    <rect x="244" y="428" width="48" height="18" rx="5" fill="#fff" stroke="#97c47c"/><text x="268" y="441" class="tpl" text-anchor="middle">T6.3</text>
    <text x="304" y="441" class="lyrd" fill="#4a7c34">law: T9 → D1 → T6.1 → T6.2 → T6.3</text>
  </g>

  <!-- Layer 4 -->
  <rect x="74" y="460" width="486" height="54" rx="9" fill="#FCE4D6" stroke="#e7b696" filter="url(#sh)"/>
  <text x="90" y="484" class="lyr" fill="#8a4a25">Layer 4 — Guided Speaking</text>
  <rect x="90" y="490" width="40" height="18" rx="5" fill="#fff" stroke="#dba883"/><text x="110" y="503" class="tpl" text-anchor="middle">T8</text>
  <rect x="136" y="490" width="48" height="18" rx="5" fill="#fff" stroke="#dba883"/><text x="160" y="503" class="tpl" text-anchor="middle">T8.2</text>
  <text x="196" y="503" class="lyrd" fill="#8a4a25">high → low support sentence production</text>

  <!-- Layer 5 -->
  <rect x="74" y="522" width="486" height="50" rx="9" fill="#FFE699" stroke="#e3c766" filter="url(#sh)"/>
  <text x="90" y="546" class="lyr" fill="#7a5b00">Layer 5 — Independent Speaking</text>
  <rect x="90" y="551" width="40" height="17" rx="5" fill="#fff" stroke="#cbb25a"/><text x="110" y="563" class="tpl" text-anchor="middle">C1</text>
  <text x="144" y="563" class="lyrd" fill="#7a5b00">open-ended free production — the summit of the ladder</text>

  <!-- RIGHT: cross-cutting constraints -->
  <text x="584" y="152" class="ph">CROSS-CUTTING CONSTRAINTS  ·  apply across every layer</text>

  <rect x="584" y="164" width="520" height="86" rx="9" fill="#fff" stroke="#cdd7e3" filter="url(#sh)"/>
  <text x="600" y="186" class="ch" fill="#8430ce">↕ Ordering Laws (non-negotiable)</text>
  <text x="600" y="207" class="cd">· Cognitive scaffold: T9 → D1 → T6.1 → T6.2 → T6.3</text>
  <text x="600" y="224" class="cd">· Concept curve: F1 → F2 → F3 → T7 → T7.1</text>
  <text x="600" y="241" class="cd">· Vocab gate: T4 → T1/T2 → T3 → T5</text>

  <rect x="584" y="258" width="520" height="92" rx="9" fill="#fff" stroke="#cdd7e3" filter="url(#sh)"/>
  <text x="600" y="280" class="ch" fill="#137333">⮌ Interleaving Law (GR-1 / GR-2)</text>
  <text x="600" y="301" class="cons">No sentence template (D1, T6.x) until EVERY word in that</text>
  <text x="600" y="317" class="cons">sentence has cleared Layer 1 + a Layer 2 check + a T9 gate.</text>
  <text x="600" y="333" class="cons">Vocabulary playables and sentence playables must alternate.</text>

  <rect x="584" y="358" width="520" height="96" rx="9" fill="#fff" stroke="#cdd7e3" filter="url(#sh)"/>
  <text x="600" y="380" class="ch" fill="#1a73e8">⌖ Age Gates (3 · 4 · 5 · 6–7)</text>
  <text x="600" y="401" class="cons">· T5 forbidden &lt; age 5 · T2 &amp; T7.1 require age 5+</text>
  <text x="600" y="417" class="cons">· T7, T6.3 excluded at age 3 · per-age vocab gates differ</text>
  <text x="600" y="433" class="cons">· sentence length scales 2–4 words (age 3) → 8–12 (age 6–7)</text>

  <rect x="584" y="462" width="520" height="76" rx="9" fill="#fff" stroke="#cdd7e3" filter="url(#sh)"/>
  <text x="600" y="484" class="ch" fill="#c2185b">⏱ Speaking-Urgency Deadlines</text>
  <text x="600" y="505" class="cons">· First oral production (T6.2+) must occur by Question #14</text>
  <text x="600" y="521" class="cons">· Full guided speaking (T8 / T8.2) by Question #18</text>

  <rect x="584" y="546" width="520" height="86" rx="9" fill="#fff" stroke="#cdd7e3" filter="url(#sh)"/>
  <text x="600" y="568" class="ch" fill="#b06000">⇄ I/O Modality Contracts (per template)</text>
  <text x="600" y="589" class="cons">Each template defines distinct semantics for: Instruction Text ·</text>
  <text x="600" y="605" class="cons">Instruction VO · Audio-in-Question · VO-for-Question · STT —</text>
  <text x="600" y="621" class="cons">plus input mode (tap / voice / text) and distractor rules.</text>

  <!-- FOOTER: compiles into agents -->
  <line x1="36" y1="650" x2="1104" y2="650" stroke="#d6dde7"/>
  <text x="36" y="678" class="ph">ONE MARKDOWN FILE  →  A MULTI-DIMENSIONAL CONSTRAINT SOLVER, read by every stage</text>

  <g filter="url(#sh)">
    <rect x="36" y="694" width="340" height="110" rx="9" fill="#e8f0fe" stroke="#1a73e8"/>
  </g>
  <text x="54" y="718" class="ch" fill="#174ea6" font-size="13px">Planner Agent</text>
  <text x="54" y="740" class="cd">reads layers + age gates + ordering</text>
  <text x="54" y="758" class="cd">laws → emits the curriculum blueprint</text>
  <text x="54" y="782" class="cons">(Phase 1)</text>

  <g filter="url(#sh)">
    <rect x="400" y="694" width="340" height="110" rx="9" fill="#e8f0fe" stroke="#1a73e8"/>
  </g>
  <text x="418" y="718" class="ch" fill="#174ea6" font-size="13px">Fabricator Agent</text>
  <text x="418" y="740" class="cd">reads per-template I/O contracts →</text>
  <text x="418" y="758" class="cd">builds the 26-column question matrix</text>
  <text x="418" y="782" class="cons">(Phase 2)</text>

  <g filter="url(#sh)">
    <rect x="764" y="694" width="340" height="110" rx="9" fill="#e6f4ea" stroke="#137333"/>
  </g>
  <text x="782" y="718" class="ch" fill="#0d652d" font-size="13px">Deterministic Validators</text>
  <text x="782" y="740" class="cd">enforce ordering, interleaving, age</text>
  <text x="782" y="758" class="cd">gates &amp; speaking deadlines as code</text>
  <text x="782" y="782" class="cons">(Evaluators)</text>

  <line x1="376" y1="749" x2="398" y2="749" stroke="#334155" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="740" y1="749" x2="762" y2="749" stroke="#334155" stroke-width="1.6" marker-end="url(#ar)"/>
</svg>
