version: 1
applications:
  # Monorepo: the deployable web app lives in ./frontend (Next.js).
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        # Static export (next.config output: "export") lands in frontend/out
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
